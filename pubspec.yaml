name: tool_node
description: "A2 Batch P2P Tool Sharing"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_storage: ^12.4.10
  http: ^1.1.0
  # 🚜 Registering your machinery images so they appear in the app
  image_picker: ^1.2.1

  # The Core Backend Stack
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.6.12

  # The "Handshake" Tools
  nearby_connections: ^4.3.0
  mobile_scanner: ^5.2.0
  local_auth: ^2.2.0

  # The Location Tools
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.0

  # Default Icons & Extras
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  provider: ^6.1.5+1
  intl: ^0.20.2

  # 💳 PAYMENTS
  razorpay_flutter: ^1.3.7
  qr_flutter: ^4.1.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/drill.jpg
    - assets/images/electrical.jpg
    - assets/images/garderning.jpg
    - assets/images/ladder.jpg